# Legit Flow — Demo Policy
# Relaxed policy for demo purposes: pseudonymize instead of block
# to show data transformation in action.

version: "1.0.0-demo"
name: "demo-showcase"
description: "Demo policy — pseudonymize restricted, mask confidential (shows transforms clearly)"

defaults:
  restricted: tokenize       # Encrypt to tokens
  confidential: tokenize     # Encrypt to tokens
  internal: allow
  public: allow

rules:
  - name: tokenize-citizen-id
    description: "Tokenize CCCD (Mã hoá 2 chiều)"
    detection_types: [CCCD]
    tier: restricted
    action: tokenize
    enabled: true

  - name: tokenize-secrets
    description: "Tokenize secrets"
    detection_types: [JWT, API_KEY]
    tier: restricted
    action: tokenize
    enabled: true

  - name: tokenize-phone
    description: "Tokenize phone numbers"
    detection_types: [PHONE_VN]
    tier: confidential
    action: tokenize
    enabled: true

  - name: tokenize-email
    description: "Tokenize emails"
    detection_types: [EMAIL]
    tier: confidential
    action: tokenize
    enabled: true
