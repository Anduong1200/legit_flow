# Legit Flow — Default Policy
# This is the production-hardened default policy.
# Risk tier determines the default action for each detection.

version: "1.0.0"
name: "default-hardened"
description: "Default policy — block restricted, mask confidential, allow internal/public"

defaults:
  restricted: tokenize       # CCCD, bank accounts, secrets → tokenize (round-trip encryption)
  confidential: tokenize     # phone, email → tokenize
  internal: allow            # contextual flags → passthrough (log only)
  public: allow              # clean content → passthrough

rules:
  - name: tokenize-citizen-id
    description: "Tokenize (Encrypt) Vietnamese CCCD (Căn cước công dân)"
    detection_types: [CCCD]
    tier: restricted
    action: tokenize
    enabled: true

  - name: tokenize-secrets
    description: "Tokenize JWT tokens, API keys, and other secrets"
    detection_types: [JWT, API_KEY]
    tier: restricted
    action: tokenize
    enabled: true

  - name: tokenize-phone
    description: "Tokenize Vietnamese phone numbers"
    detection_types: [PHONE_VN]
    tier: confidential
    action: tokenize
    enabled: true

  - name: tokenize-email
    description: "Tokenize email addresses"
    detection_types: [EMAIL]
    tier: confidential
    action: tokenize
    enabled: true

  - name: tokenize-bank-account
    description: "Tokenize bank account numbers"
    detection_types: [BANK_ACCOUNT]
    tier: restricted
    action: tokenize
    enabled: true
