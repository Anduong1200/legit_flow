# Legit Flow — Default Policy
# This is the production-hardened default policy.
# Risk tier determines the default action for each detection.

version: "1.0.0"
name: "default-hardened"
description: "Default policy — block restricted, mask confidential, allow internal/public"

defaults:
  restricted: block          # CCCD, bank accounts, secrets → hard block
  confidential: mask         # phone, email → partial masking
  internal: allow            # contextual flags → passthrough (log only)
  public: allow              # clean content → passthrough

rules:
  - name: block-citizen-id
    description: "Block Vietnamese CCCD (Căn cước công dân) from output"
    detection_types: [CCCD]
    tier: restricted
    action: block
    enabled: true

  - name: block-secrets
    description: "Block JWT tokens, API keys, and other secrets"
    detection_types: [JWT, API_KEY]
    tier: restricted
    action: block
    enabled: true

  - name: mask-phone
    description: "Mask Vietnamese phone numbers (keep prefix/suffix)"
    detection_types: [PHONE_VN]
    tier: confidential
    action: mask
    enabled: true

  - name: mask-email
    description: "Mask email addresses"
    detection_types: [EMAIL]
    tier: confidential
    action: mask
    enabled: true

  - name: mask-bank-account
    description: "Block bank account numbers"
    detection_types: [BANK_ACCOUNT]
    tier: restricted
    action: block
    enabled: true
