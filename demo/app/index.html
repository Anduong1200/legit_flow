<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legit Flow — Demo</title>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --text: #e2e8f0; --muted: #94a3b8;
      --accent: #3b82f6; --accent-glow: #2563eb;
      --danger: #ef4444; --success: #22c55e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    .header { background: linear-gradient(135deg, var(--surface), #0f172a); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
    .header h1 { font-size: 1.25rem; font-weight: 700; }
    .header h1 span { color: var(--accent); }
    .header .badge { background: var(--accent); color: white; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.7rem; font-weight: 600; }
    .chat-container { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; display: flex; flex-direction: column; gap: 1rem; max-width: 800px; margin: 0 auto; width: 100%; }
    .message { padding: 0.75rem 1rem; border-radius: 12px; max-width: 85%; line-height: 1.5; font-size: 0.9rem; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .message.bot { background: var(--surface); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }
    .message.blocked { background: rgba(239,68,68,0.15); border-color: var(--danger); }
    .message .meta { font-size: 0.7rem; color: var(--muted); margin-top: 0.4rem; }
    .message.blocked .meta { color: var(--danger); }
    .input-area { background: var(--surface); border-top: 1px solid var(--border); padding: 1rem 2rem; }
    .input-wrap { max-width: 800px; margin: 0 auto; display: flex; gap: 0.75rem; }
    .input-wrap input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    .input-wrap input:focus { border-color: var(--accent); }
    .input-wrap button { background: var(--accent); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .input-wrap button:hover { background: var(--accent-glow); }
    .input-wrap button:disabled { opacity: 0.5; cursor: not-allowed; }
    .scenarios { padding: 0.75rem 2rem; background: var(--surface); border-bottom: 1px solid var(--border); }
    .scenarios h3 { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .scenario-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .scenario-btns button { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
    .scenario-btns button:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
  <div class="header">
    <h1>🛡️ <span>Legit Flow</span> Gateway Demo</h1>
    <span class="badge">DEMO MODE</span>
  </div>

  <div class="scenarios">
    <h3>Test Scenarios</h3>
    <div class="scenario-btns">
      <button onclick="sendScenario('Thông tin khách hàng: Nguyễn Văn An, CCCD 001234567890, SĐT 0912345678')">🔒 VN PII (CCCD + SĐT)</button>
      <button onclick="sendScenario('Gửi email tới test@company.com.vn để xác nhận hợp đồng')">📧 Email</button>
      <button onclick="sendScenario('API key: sk-abc123def456ghi789jkl012mno345pqr678')">🔑 API Key</button>
      <button onclick="sendScenario('Token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIn0.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c')">🎫 JWT Token</button>
      <button onclick="sendScenario('Hôm nay thời tiết đẹp, hãy đi dạo công viên.')">✅ Clean text</button>
    </div>
  </div>

  <div class="chat-container" id="chat"></div>

  <div class="input-area">
    <div class="input-wrap">
      <input type="text" id="input" placeholder="Nhập tin nhắn để test qua Legit Flow gateway..." onkeydown="if(event.key==='Enter') send()">
      <button onclick="send()" id="sendBtn">Gửi</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, type, meta) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.innerHTML = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      if (meta) {
        const metaEl = document.createElement('div');
        metaEl.className = 'meta';
        metaEl.textContent = meta;
        div.appendChild(metaEl);
      }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function sendScenario(text) {
      input.value = text;
      send();
    }

    async function send() {
      const msg = input.value.trim();
      if (!msg) return;

      addMessage(msg, 'user');
      input.value = '';
      sendBtn.disabled = true;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg })
        });
        const data = await res.json();

        if (data.blocked) {
          addMessage(data.reply, 'bot blocked', `Request ID: ${data.request_id} | ⛔ BLOCKED BY POLICY`);
        } else {
          addMessage(data.reply, 'bot', data.request_id ? `Request ID: ${data.request_id}` : '');
        }
      } catch (e) {
        addMessage('❌ Connection error: ' + e.message, 'bot blocked');
      }
      sendBtn.disabled = false;
      input.focus();
    }

    // Welcome message
    addMessage('👋 Chào mừng đến với Legit Flow Demo! Hãy thử gửi tin nhắn chứa PII (CCCD, SĐT, email) hoặc secrets (JWT, API key) để xem hệ thống phát hiện và xử lý.', 'bot');
  </script>
</body>
</html>
