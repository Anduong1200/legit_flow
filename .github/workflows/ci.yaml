name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]

jobs:
    lint-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: "1.22"

            - name: Go lint
              uses: golangci/golangci-lint-action@v4
              with:
                  version: latest

            - name: Unit tests
              run: go test ./internal/... -v -race -cover -coverprofile=coverage.out

            - name: Upload coverage
              uses: actions/upload-artifact@v4
              with:
                  name: coverage
                  path: coverage.out

    build:
        runs-on: ubuntu-latest
        needs: lint-test
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: "1.22"

            - name: Build gateway
              run: go build -trimpath -ldflags="-s -w" -o bin/gateway ./cmd/gateway

            - name: Build demo app
              run: go build -trimpath -ldflags="-s -w" -o bin/demo-app ./demo/app

            - name: Build LLM mock
              run: go build -trimpath -ldflags="-s -w" -o bin/llm-mock ./demo/llm-mock

    container-scan:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v4

            - name: Build Docker image
              run: docker build -t legitflow/gateway:ci .

            - name: Trivy scan
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: "legitflow/gateway:ci"
                  format: "table"
                  exit-code: "1"
                  severity: "CRITICAL,HIGH"

    helm-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Helm
              uses: azure/setup-helm@v3
              with:
                  version: v3.14.0

            - name: Helm lint
              run: helm lint deploy/helm/legit-flow

            - name: Helm template
              run: helm template legit-flow deploy/helm/legit-flow
