{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "legit-flow.fullname" . }}-deny-all
  labels:
    {{- include "legit-flow.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "legit-flow.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "legit-flow.fullname" . }}-allow-gateway
  labels:
    {{- include "legit-flow.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "legit-flow.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
        - port: 9090
          protocol: TCP
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow backend LLM
    - ports:
        - port: 11434
          protocol: TCP
    # Allow classifier API (if enabled)
    - ports:
        - port: 443
          protocol: TCP
{{- end }}
