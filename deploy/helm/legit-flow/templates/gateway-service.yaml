apiVersion: v1
kind: Service
metadata:
  name: {{ include "legit-flow.fullname" . }}-gateway
  labels:
    {{- include "legit-flow.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.gateway.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "legit-flow.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
