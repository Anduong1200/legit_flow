apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "legit-flow.fullname" . }}-gateway
  labels:
    {{- include "legit-flow.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "legit-flow.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "legit-flow.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
        seccompProfile:
          type: {{ .Values.securityContext.seccompProfile.type }}
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            {{- range $key, $value := .Values.gateway.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.gateway.classifierSecret.enabled }}
            - name: LEGIT_CLASSIFIER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gateway.classifierSecret.secretName }}
                  key: {{ .Values.gateway.classifierSecret.key }}
            {{- end }}
          securityContext:
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            capabilities:
              drop:
                {{- toYaml .Values.securityContext.capabilities.drop | nindent 16 }}
          volumeMounts:
            - name: policy-config
              mountPath: /etc/legit-flow/policies
              readOnly: true
            - name: audit-logs
              mountPath: /var/log/legit-flow/audit
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
      volumes:
        - name: policy-config
          configMap:
            name: {{ .Values.policy.configMapName }}
        - name: audit-logs
          {{- if .Values.audit.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "legit-flow.fullname" . }}-audit
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
